<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Ledger</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --page:#f5f7f2;
    --page-2:#ffffff;
    --surface:#ffffff;
    --surface-soft:#f8faf5;
    --surface-green:#eef6e9;
    --text:#182016;
    --muted:#6f7b68;
    --muted-2:#98a391;
    --line:#e2e8dc;
    --line-strong:#cdd8c5;
    --green:#2f6b3f;
    --green-2:#3f8752;
    --gold:#c59b3d;
    --gold-2:#e0b95b;
    --red:#d25757;
    --red-soft:#fff0f0;
    --blue:#3f78c5;
    --shadow:0 18px 50px rgba(36,55,34,.10);
    --shadow-soft:0 10px 26px rgba(36,55,34,.07);
    --radius:24px;
    --radius-sm:16px;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 10% -10%, rgba(197,155,61,.18), transparent 28%),
      radial-gradient(circle at 92% 2%, rgba(63,135,82,.13), transparent 30%),
      linear-gradient(180deg, #ffffff 0%, var(--page) 62%, #eef3ea 100%);
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(47,107,63,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,107,63,.03) 1px, transparent 1px);
    background-size:40px 40px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.55), transparent 78%);
  }

  .wrap{
    position:relative;
    max-width:920px;
    margin:0 auto;
    padding:24px 14px 80px;
  }

  h1,h2,h3{
    margin:0;
    letter-spacing:-.02em;
  }

  button, input, select{
    font:inherit;
  }

  button{
    -webkit-tap-highlight-color:transparent;
  }


  .view-only-badge{
    flex-shrink:0;
    padding:9px 13px;
    border-radius:999px;
    color:var(--green);
    background:var(--surface-green);
    border:1px solid rgba(47,107,63,.18);
    font-size:11px;
    font-weight:950;
    letter-spacing:.12em;
  }

  .stats-only-note{
    margin-bottom:14px;
    padding:12px 14px;
    border-radius:18px;
    color:var(--muted);
    background:#fff;
    border:1px solid var(--line);
    box-shadow:0 8px 18px rgba(36,55,34,.035);
    font-size:12px;
    line-height:1.55;
  }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
    padding:20px;
    border:1px solid rgba(255,255,255,.75);
    border-radius:28px;
    background:
      linear-gradient(135deg, rgba(255,255,255,.96), rgba(248,250,245,.88));
    box-shadow:var(--shadow);
  }

  .brand{
    position:relative;
    font-weight:950;
    font-size:clamp(24px, 5vw, 42px);
    line-height:.95;
    letter-spacing:-.07em;
    color:var(--text);
  }

  .brand::after{
    content:"Cruizero League";
    display:block;
    margin-top:9px;
    font-size:11px;
    font-weight:850;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .brand span{ color:var(--green); }

  .team-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:4px 2px 12px;
    margin-bottom:8px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .team-tabs::-webkit-scrollbar{display:none;}

  .team-tab,
  .add-team-btn{
    flex-shrink:0;
    border-radius:999px;
    padding:10px 15px;
    font-size:13px;
    font-weight:850;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
  }

  .team-tab{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
    background:rgba(255,255,255,.86);
    border:1px solid var(--line);
    box-shadow:0 6px 18px rgba(36,55,34,.04);
  }

  .team-tab:hover,
  .add-team-btn:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-soft);
    border-color:var(--line-strong);
  }

  .team-tab.active{
    color:#fff;
    border-color:var(--green);
    background:linear-gradient(135deg, var(--green-2), var(--green));
    box-shadow:0 12px 28px rgba(47,107,63,.22);
  }

  .team-tab .dot{
    width:9px;
    height:9px;
    border-radius:999px;
    flex-shrink:0;
    box-shadow:0 0 0 3px rgba(255,255,255,.45);
  }

  .add-team-btn{
    color:var(--green);
    background:#fff;
    border:1px dashed rgba(47,107,63,.42);
  }

  .summary{
    position:relative;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.78);
    border-radius:30px;
    padding:24px;
    margin-bottom:18px;
    background:
      radial-gradient(circle at 100% 0%, rgba(197,155,61,.16), transparent 34%),
      linear-gradient(135deg, #ffffff, #f6faf3);
    box-shadow:var(--shadow);
  }

  .summary::before{
    content:"";
    position:absolute;
    right:-88px;
    bottom:-106px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:linear-gradient(135deg, rgba(47,107,63,.10), rgba(197,155,61,.10));
    border:1px solid rgba(47,107,63,.08);
  }

  .summary .teamname{
    position:relative;
    font-size:clamp(26px, 7vw, 48px);
    line-height:1;
    font-weight:950;
    letter-spacing:-.075em;
    color:var(--text);
    margin-bottom:17px;
  }

  .summary .teamname .editbtn{
    display:inline-flex;
    align-items:center;
    vertical-align:middle;
    margin-left:10px;
    padding:7px 11px;
    border-radius:999px;
    font-size:11px;
    font-weight:850;
    letter-spacing:0;
    color:var(--green);
    background:var(--surface-green);
    cursor:pointer;
    text-decoration:none;
  }

  .ledger{
    position:relative;
    display:grid;
    grid-template-columns:repeat(5, minmax(0, 1fr));
    gap:10px;
  }

  .ledger span{
    min-height:70px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:5px;
    padding:13px;
    border-radius:20px;
    color:var(--muted);
    font-size:11px;
    font-weight:850;
    letter-spacing:.07em;
    text-transform:uppercase;
    background:#fff;
    border:1px solid var(--line);
    box-shadow:0 8px 18px rgba(36,55,34,.045);
  }

  .ledger b{
    color:var(--green);
    font-size:20px;
    letter-spacing:-.045em;
  }

  .section{
    overflow:hidden;
    margin-bottom:14px;
    border:1px solid rgba(255,255,255,.84);
    border-radius:26px;
    background:rgba(255,255,255,.92);
    box-shadow:var(--shadow-soft);
  }

  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 18px;
    cursor:pointer;
    border-bottom:1px solid var(--line);
    background:linear-gradient(90deg, #ffffff, #f7faf4);
  }

  .section-head h2{
    font-size:14px;
    font-weight:950;
    color:var(--text);
    letter-spacing:-.01em;
  }

  .section-head .chev{
    width:29px;
    height:29px;
    display:grid;
    place-items:center;
    border-radius:999px;
    color:var(--green);
    background:var(--surface-green);
  }

  .section-body{ padding:18px; }
  .section-body.collapsed{ display:none; }

  .row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }

  .row > *{ flex:1; }

  label{
    display:block;
    margin-bottom:6px;
    font-size:11px;
    font-weight:900;
    letter-spacing:.08em;
    color:var(--muted);
    text-transform:uppercase;
  }

  input, select{
    width:100%;
    min-height:44px;
    padding:11px 12px;
    border-radius:15px;
    border:1px solid var(--line);
    color:var(--text);
    background:#fff;
    outline:none;
    box-shadow:0 4px 12px rgba(36,55,34,.035);
    transition:border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }

  input:focus, select:focus{
    border-color:rgba(47,107,63,.58);
    box-shadow:0 0 0 4px rgba(47,107,63,.10);
    background:#fff;
  }

  input::placeholder{ color:#a9b3a2; }

  .vs-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }

  .vs-row .vs{
    flex:0 0 auto;
    margin-top:22px;
    width:42px;
    height:42px;
    display:grid;
    place-items:center;
    border-radius:999px;
    color:#fff;
    font-size:12px;
    font-weight:950;
    background:linear-gradient(135deg, var(--green-2), var(--green));
    box-shadow:0 10px 22px rgba(47,107,63,.18);
  }

  .score-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:18px 0;
    padding:16px;
    border-radius:24px;
    background:linear-gradient(135deg, #f8fbf5, #ffffff);
    border:1px solid var(--line);
  }

  .score-box{
    width:78px;
    height:72px;
    text-align:center;
    font-size:34px;
    font-weight:950;
    border-radius:20px;
    color:var(--green);
    background:#fff;
    border:1px solid var(--line-strong);
    box-shadow:0 8px 18px rgba(36,55,34,.055);
  }

  .score-colon{
    margin-top:18px;
    font-size:26px;
    font-weight:950;
    color:var(--muted-2);
  }

  .result-pill-row{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-bottom:14px;
  }

  .result-pill{
    text-align:center;
    padding:12px 10px;
    border-radius:17px;
    font-size:13px;
    border:1px solid var(--line);
    color:var(--muted);
    cursor:pointer;
    font-weight:900;
    background:#fff;
    transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
  }

  .result-pill:hover{
    transform:translateY(-1px);
    box-shadow:var(--shadow-soft);
    border-color:var(--line-strong);
  }

  .result-pill.active.win{
    background:linear-gradient(135deg, var(--green-2), var(--green));
    color:#fff;
    border-color:var(--green);
  }

  .result-pill.active.draw{
    background:linear-gradient(135deg, #d8dfd1, #aebba4);
    color:#22301f;
    border-color:#aebba4;
  }

  .result-pill.active.loss{
    background:linear-gradient(135deg, #ec7777, #c94f4f);
    color:#fff;
    border-color:#d25757;
  }

  .event-block{
    margin-top:16px;
    padding-top:16px;
    border-top:1px dashed var(--line-strong);
  }

  .event-block h3{
    margin-bottom:12px;
    font-size:12px;
    font-weight:950;
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .event-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:flex-end;
    margin-bottom:10px;
    padding:11px;
    border:1px solid var(--line);
    border-radius:20px;
    background:var(--surface-soft);
  }

  .event-row select,
  .event-row input{
    min-height:40px;
    font-size:13px;
  }

  .ev-player{ flex:1.6; min-width:120px; }
  .ev-min{ flex:.7; min-width:70px; }
  .ev-type{ flex:1.1; min-width:108px; }
  .ev-assist{ flex:1.4; min-width:120px; }

  .ev-remove{
    align-self:center;
    width:34px;
    height:34px;
    border:none;
    border-radius:999px;
    color:var(--red);
    background:var(--red-soft);
    font-size:20px;
    cursor:pointer;
  }

  .add-event-btn,
  .save-btn,
  .roster-add button{
    border:none;
    cursor:pointer;
    transition:transform .16s ease, filter .16s ease, box-shadow .16s ease;
  }

  .add-event-btn{
    width:100%;
    padding:12px 0;
    border-radius:17px;
    font-size:13px;
    font-weight:900;
    color:var(--green);
    border:1px dashed rgba(47,107,63,.38);
    background:var(--surface-green);
  }

  .add-event-btn:hover,
  .save-btn:hover,
  .roster-add button:hover{
    transform:translateY(-1px);
    filter:brightness(1.02);
    box-shadow:var(--shadow-soft);
  }

  .save-btn{
    width:100%;
    margin-top:16px;
    padding:15px 0;
    border-radius:19px;
    color:#fff;
    font-size:15px;
    font-weight:950;
    letter-spacing:-.01em;
    background:linear-gradient(135deg, var(--green-2), var(--green));
    box-shadow:0 16px 32px rgba(47,107,63,.18);
  }

  .save-btn:disabled{
    opacity:.65;
    cursor:not-allowed;
    transform:none;
  }

  .roster-add{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }

  .roster-add input{ flex:1; }

  .roster-add button{
    flex:0 0 auto;
    padding:0 18px;
    border-radius:16px;
    color:#fff;
    font-weight:950;
    background:linear-gradient(135deg, var(--green-2), var(--green));
  }

  .roster-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .roster-chip{
    display:flex;
    align-items:center;
    gap:8px;
    border-radius:999px;
    padding:8px 12px;
    font-size:13px;
    font-weight:850;
    color:var(--muted);
    background:#fff;
    border:1px solid var(--line);
    box-shadow:0 5px 14px rgba(36,55,34,.035);
  }

  .roster-chip button{
    width:20px;
    height:20px;
    padding:0;
    display:grid;
    place-items:center;
    border:none;
    border-radius:999px;
    color:var(--red);
    background:var(--red-soft);
    cursor:pointer;
  }

  .empty-roster,
  .empty-state{
    color:var(--muted-2);
    font-size:13px;
    padding:20px 0;
    text-align:center;
  }

  .lineup-list{
    display:block;
  }

  .lineup-player-row{
    width:100%;
    display:grid;
    grid-template-columns:42px 1fr 110px;
    gap:8px;
    align-items:center;
    padding:9px;
    margin-bottom:8px;
    border:1px solid var(--line);
    border-radius:16px;
    background:#fff;
  }

  .lineup-player-row.selected{
    border-color:rgba(47,107,63,.35);
    background:var(--surface-green);
  }

  .lineup-toggle{
    width:34px;
    height:34px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#fff;
    color:var(--green);
    font-weight:950;
    cursor:pointer;
  }

  .lineup-player-row.selected .lineup-toggle{
    color:#fff;
    border-color:var(--green);
    background:linear-gradient(135deg, var(--green-2), var(--green));
  }

  .lineup-player-name{
    font-weight:900;
    color:var(--text);
  }

  .lineup-position-select{
    min-height:36px;
    padding:6px 9px;
    border-radius:12px;
    font-size:12px;
    font-weight:900;
  }

  .lineup-position-select:disabled{
    opacity:.45;
  }

  .lineup-select-all-btn{
    width:100%;
    margin-top:4px;
    min-height:40px;
    border-radius:14px;
    border:1px dashed rgba(47,107,63,.38);
    background:var(--surface-green);
    color:var(--green);
    font-weight:900;
    cursor:pointer;
  }

  .lineup-hint{
    margin-top:8px;
    font-size:11px;
    color:var(--muted-2);
  }

  .scoring-note{
    margin-top:8px;
    padding:10px 12px;
    border-radius:15px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--muted);
    font-size:11px;
    line-height:1.55;
  }

  .table-scroll{
    overflow-x:auto;
    border-radius:20px;
    border:1px solid var(--line);
    box-shadow:0 8px 20px rgba(36,55,34,.045);
  }

  .stat-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    min-width:980px;
    background:#fff;
  }

  .stat-table th{
    position:sticky;
    top:0;
    z-index:1;
    text-align:left;
    padding:13px 10px;
    color:var(--muted);
    font-size:11px;
    font-weight:950;
    letter-spacing:.08em;
    text-transform:uppercase;
    white-space:nowrap;
    cursor:pointer;
    background:#f8fbf5;
    border-bottom:1px solid var(--line);
  }

  .stat-table th.sorted{ color:var(--green); }

  .stat-table td{
    padding:13px 10px;
    border-bottom:1px solid var(--line);
    color:var(--text);
    white-space:nowrap;
  }

  .stat-table tr:last-child td{ border-bottom:none; }

  .stat-table td.name{
    color:var(--green);
    font-weight:950;
  }

  .stat-table td.pts{
    color:var(--gold);
    font-weight:950;
    font-size:15px;
  }

  .stat-table tr:hover td{ background:#fbfdf9; }

  .match-item{
    margin-bottom:10px;
    padding:15px;
    border:1px solid var(--line);
    border-radius:20px;
    background:linear-gradient(135deg, #ffffff, #f9fbf6);
    box-shadow:0 8px 18px rgba(36,55,34,.04);
  }

  .match-item:last-child{ margin-bottom:0; }

  .match-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }

  .match-teams{
    color:var(--text);
    font-weight:950;
    letter-spacing:-.03em;
  }

  .match-score{
    flex:0 0 auto;
    min-width:62px;
    text-align:center;
    padding:8px 10px;
    border-radius:15px;
    color:#fff;
    font-weight:950;
    background:linear-gradient(135deg, var(--green-2), var(--green));
  }

  .match-meta{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-top:9px;
    color:var(--muted);
    font-size:11px;
  }

  .match-meta span{
    padding:4px 8px;
    border-radius:999px;
    background:#fff;
    border:1px solid var(--line);
  }

  .match-events,
  .match-lineup{
    margin-top:10px;
    padding:10px;
    border-radius:15px;
    color:var(--muted);
    font-size:12px;
    background:#f4f7f0;
    border:1px solid var(--line);
  }

  .match-lineup{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
  }

  .lineup-tag{
    display:inline-flex;
    gap:4px;
    padding:4px 8px;
    border-radius:999px;
    background:#fff;
    border:1px solid var(--line);
    color:var(--muted);
    font-size:11px;
    font-weight:850;
  }

  .match-events div{ margin-bottom:4px; }
  .match-events div:last-child{ margin-bottom:0; }

  .match-delete{
    margin-top:10px;
    padding:7px 10px;
    border-radius:13px;
    cursor:pointer;
    color:var(--red);
    border:1px solid rgba(210,87,87,.22);
    background:var(--red-soft);
    font-size:11px;
    font-weight:900;
  }

  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(8px);
    z-index:50;
    max-width:calc(100vw - 32px);
    opacity:0;
    pointer-events:none;
    padding:12px 18px;
    border-radius:999px;
    color:#fff;
    background:linear-gradient(135deg, var(--green-2), var(--green));
    font-size:13px;
    font-weight:950;
    box-shadow:0 18px 50px rgba(36,55,34,.22);
    transition:opacity .25s, transform .25s;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    background:rgba(20,32,19,.42);
    backdrop-filter:blur(8px);
  }

  .modal-overlay.show{ display:flex; }

  .modal-box{
    width:100%;
    max-width:370px;
    padding:20px;
    border-radius:26px;
    border:1px solid rgba(255,255,255,.85);
    background:#fff;
    box-shadow:var(--shadow);
  }

  .modal-box h3{
    margin-bottom:14px;
    font-size:18px;
    font-weight:950;
    letter-spacing:-.04em;
  }

  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:16px;
  }

  .modal-actions button{
    flex:1;
    min-height:42px;
    border-radius:15px;
    cursor:pointer;
    color:var(--muted);
    border:1px solid var(--line);
    background:#fff;
    font-weight:900;

<script>
/*
  ================================
  1) ใส่ Supabase URL และ anon key ตรงนี้
  ================================
*/
const SUPABASE_URL = 'https://atzazaxtxhzrvqxlhhqj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_jmf71edz6dGKqsEfNJMWvA_O_x6xtkY';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ACTIVE_TEAM_KEY = 'match_ledger_active_team_id_v1';

const TEAM_COLORS = ['#c9a14a','#9e3b3b','#3a6ea5','#4a7a4a','#7a4a8a','#888888','#1a1a1a','#d9d9d9'];

const POSITION_LABELS = {
  GK: 'GK',
  DEF: 'DEF',
  MID: 'MID',
  ATT: 'ATT'
};

function getGoalPointByPosition(pos){
  if(pos === 'GK' || pos === 'DEF') return 6;
  if(pos === 'MID') return 4;
  return 3;
}

function getCleanSheetPointByPosition(pos){
  if(pos === 'GK' || pos === 'DEF') return 5;
  if(pos === 'MID') return 2;
  return 1;
}

function getLineupName(item){
  return typeof item === 'string' ? item : item.name;
}

function getLineupPos(item){
  return typeof item === 'string' ? 'ATT' : (item.pos || 'ATT');
}

let state = {
  teams: [],
  matches: [],
  activeTeamId: localStorage.getItem(ACTIVE_TEAM_KEY) || null
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function uid(prefix){
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

function getActiveTeam(){
  return state.teams.find(t=>t.id === state.activeTeamId);
}

function saveActiveTeamId(){
  if(state.activeTeamId){
    localStorage.setItem(ACTIVE_TEAM_KEY, state.activeTeamId);
  }
}

async function loadState(){
  try{
    const { data: teams, error: teamError } = await supabaseClient
      .from('teams')
      .select('*')
      .order('created_at', { ascending:true });

    if(teamError) throw teamError;

    const { data: matches, error: matchError } = await supabaseClient
      .from('matches')
      .select('*')
      .order('created_at', { ascending:false });

    if(matchError) throw matchError;

    state.teams = (teams || []).map(t => ({
      id: t.id,
      name: t.name,
      color: t.color,
      roster: Array.isArray(t.roster) ? t.roster : [],
      formation: t.formation || {}
    }));

    state.matches = (matches || []).map(m => ({
      id: m.id,
      teamId: m.team_id,
      homeTeam: m.home_team,
      awayTeam: m.away_team,
      homeScore: Number(m.home_score || 0),
      awayScore: Number(m.away_score || 0),
      date: m.match_date,
      league: m.league || '',
      result: m.result,
      lineup: Array.isArray(m.lineup) ? m.lineup : [],
      events: Array.isArray(m.events) ? m.events : []
    }));

    if(state.teams.length === 0){
      await seedDefaultTeams();
      return await loadState();
    }

    const stillHasActiveTeam = state.teams.some(t => t.id === state.activeTeamId);
    if(!state.activeTeamId || !stillHasActiveTeam){
      state.activeTeamId = state.teams[0].id;
      saveActiveTeamId();
    }

  }catch(e){
    console.error('load failed', e);
    showToast('โหลดข้อมูลไม่สำเร็จ เช็ก Supabase URL / KEY / ตาราง');
  }
}

async function seedDefaultTeams(){
  const defaultTeams = [
    {
      id:'team_black',
      name:'Black Ballonkador',
      color:'#1a1a1a',
      roster:['Pop','Five','Bam','Moth','Pum','Sharp','Mac','Net','Aunza','Golf'],
      formation:{}
    },
    {
      id:'team_white',
      name:'White PratanPorn',
      color:'#e8e8e0',
      roster:['A','B','C','D','E','F','G'],
      formation:{}
    },
    {
      id:'team_pink',
      name:'Pink Basgangster',
      color:'#d4769a',
      roster:['A','B','C','D','E','F','G'],
      formation:{}
    },
    {
      id:'team_red',
      name:'Red Ceasasalad',
      color:'#9e3b3b',
      roster:['A','B','C','D','E','F','G'],
      formation:{}
    }
  ];

  const { error } = await supabaseClient
    .from('teams')
    .insert(defaultTeams);

  if(error) throw error;

  state.activeTeamId = 'team_black';
  saveActiveTeamId();
}

async function updateTeam(teamId, patch){
  const { error } = await supabaseClient
    .from('teams')
    .update(patch)
    .eq('id', teamId);

  if(error){
    console.error(error);
    showToast('อัปเดตทีมไม่สำเร็จ');
    return false;
  }

  await loadState();
  return true;
}

/* ========== TEAM TABS ========== */
function renderTeamTabs(){
  const wrap = document.getElementById('teamTabs');

  wrap.innerHTML = state.teams.map(t=>`
    <div class="team-tab ${t.id===state.activeTeamId?'active':''}" data-team="${t.id}">
      <span class="dot" style="background:${t.color}"></span>${t.name}
    </div>
  `).join('') + `<div class="add-team-btn" id="addTeamBtn">+ ทีมใหม่</div>`;

  wrap.querySelectorAll('.team-tab').forEach(el=>{
    el.addEventListener('click', ()=>{
      state.activeTeamId = el.dataset.team;
      saveActiveTeamId();
      renderAll();
    });

  document.getElementById('addTeamBtn').addEventListener('click', openNewTeamModal);
}

/* ========== NEW TEAM MODAL ========== */
let selectedColor = TEAM_COLORS[0];

function openNewTeamModal(){
  selectedColor = TEAM_COLORS[0];
  document.getElementById('newTeamName').value = '';
  renderColorSwatches();
  document.getElementById('newTeamModal').classList.add('show');
}

function renderColorSwatches(){

      selectedColor = el.dataset.color;
      renderColorSwatches();

}

document.getElementById('cancelNewTeam').addEventListener('click', ()=>{
  document.getElementById('newTeamModal').classList.remove('show');
});

document.getElementById('confirmNewTeam').addEventListener('click', async ()=>{
  const name = document.getElementById('newTeamName').value.trim();
  if(!name){
    showToast('กรอกชื่อทีมก่อนนะครับ');
    return;
  }

  const newTeam = {
    id: uid('team'),
    name,
    color: selectedColor,
    roster: [],
    formation: {}
  };

  const { error } = await supabaseClient
    .from('teams')
    .insert(newTeam);

  if(error){
    console.error(error);
    showToast('สร้างทีมไม่สำเร็จ');
    return;
  }

  state.activeTeamId = newTeam.id;
  saveActiveTeamId();

  document.getElementById('newTeamModal').classList.remove('show');
  await loadState();
  renderAll();
  showToast('สร้างทีม ' + name + ' แล้ว');
});

/* ========== SUMMARY ========== */
function computeTeamSummary(team){
  const matches = state.matches.filter(m=>m.teamId===team.id);
  let w=0,d=0,l=0,gf=0,ga=0,cs=0;

  matches.forEach(m=>{
    if(m.result==='win') w++;
    else if(m.result==='draw') d++;
    else l++;

    gf += m.homeScore;
    ga += m.awayScore;

    if(m.awayScore===0) cs++;
  });

  const ap = matches.length;
  const wpct = ap ? (w/ap*100) : 0;
  return {ap,w,d,l,gf,ga,cs,wpct};
}

function renderSummary(){
  const team = getActiveTeam();
  const el = document.getElementById('summaryBlock');

  if(!team){
    el.innerHTML = '<div class="empty-state">ยังไม่มีทีม กดสร้างทีมใหม่ด้านบนได้เลย</div>';
    return;
  }

  const s = computeTeamSummary(team);
  el.innerHTML = `
    <div class="teamname">${team.name} <span class="editbtn" id="renameTeamBtn">เปลี่ยนชื่อ</span></div>
    <div class="ledger">
      <span>W-D-L <b>${s.w}-${s.d}-${s.l}</b></span>
      <span>WIN% <b>${s.wpct.toFixed(1)}%</b></span>
      <span>GF-GA <b>${s.gf}-${s.ga}</b></span>
      <span>CS <b>${s.cs}</b></span>
      <span>นัดทั้งหมด <b>${s.ap}</b></span>
    </div>
  `;

  document.getElementById('renameTeamBtn').addEventListener('click', async ()=>{
    const newName = prompt('ชื่อทีมใหม่', team.name);
    if(newName && newName.trim()){
      const ok = await updateTeam(team.id, { name: newName.trim() });
      if(ok) renderAll();
    }
  });
}

/* ========== FORM REMOVED: STATS ONLY VIEW ========== */

/* ========== ROSTER REMOVED: STATS ONLY VIEW ========== */

/* ========== STATS TABLE ========== */
let sortKey = 'pts';
let sortDir = 'desc';
let detailSortKey = 'csPts';
let detailSortDir = 'desc';

function makeEmptyPlayerStats(playerName){
  return {
    name: playerName,
    ap: 0,
    w: 0,
    d: 0,
    l: 0,
    g: 0,
    a: 0,
    gc: 0,
    cs: 0,
    sv: 0,
    og: 0,

    goalPts: 0,
    assistPts: 0,
    csPts: 0,
    saveBonus: 0,
    ogPts: 0,
    pts: 0,

    wpct: 0,
    gpm: 0,
    apm: 0,
    gcpm: 0,
    ppm: 0,
    csr: 0
  };
}

function computePlayerStats(team){
  const matches = state.matches.filter(m=>m.teamId===team.id);
  const stats = {};

  team.roster.forEach(p=>{
    stats[p] = makeEmptyPlayerStats(p);
  });

  matches.forEach(m=>{
    const lineupItems = Array.isArray(m.lineup) ? m.lineup : [];

    let playersInMatch = lineupItems.length
      ? new Map(lineupItems.map(item => [getLineupName(item), getLineupPos(item)]))
      : new Map();

    if(playersInMatch.size === 0){
      m.events.forEach(ev=>{
        if(ev.player) playersInMatch.set(ev.player, 'ATT');
        if(ev.assistPlayer) playersInMatch.set(ev.assistPlayer, 'ATT');
      });
    }

    playersInMatch.forEach((pos, playerName)=>{
      if(!stats[playerName]){
        stats[playerName] = makeEmptyPlayerStats(playerName);
      }

      stats[playerName].ap++;

      if(m.result === 'win') stats[playerName].w++;
      else if(m.result === 'draw') stats[playerName].d++;
      else stats[playerName].l++;

      if(m.awayScore === 0){
        const csPoint = getCleanSheetPointByPosition(pos);
        stats[playerName].cs++;
        stats[playerName].csPts += csPoint;
        stats[playerName].pts += csPoint;
      }
    });

    m.events.forEach(ev=>{
      const playerPos = playersInMatch.get(ev.player) || 'ATT';

      if(ev.player && !stats[ev.player]){
        stats[ev.player] = makeEmptyPlayerStats(ev.player);
      }

      if(ev.assistPlayer && !stats[ev.assistPlayer]){
        stats[ev.assistPlayer] = makeEmptyPlayerStats(ev.assistPlayer);
      }

      if(ev.type === 'goal' && ev.player){
        const goalPoint = getGoalPointByPosition(playerPos);
        stats[ev.player].g++;
        stats[ev.player].goalPts += goalPoint;
        stats[ev.player].pts += goalPoint;

        if(ev.assistPlayer){
          stats[ev.assistPlayer].a++;
          stats[ev.assistPlayer].assistPts += 3;
          stats[ev.assistPlayer].pts += 3;
        }
      }

      if(ev.type === 'save' && ev.player){
        stats[ev.player].sv++;
      }

      if(ev.type === 'og' && ev.player){
        stats[ev.player].og++;
        stats[ev.player].ogPts -= 2;
        stats[ev.player].pts -= 2;
      }
    });
  });

  Object.values(stats).forEach(s=>{
    s.saveBonus = Math.floor(s.sv / 3) * 2;
    s.pts += s.saveBonus;

    s.gc = s.g + s.a;
    s.wpct = s.ap ? (s.w / s.ap * 100) : 0;
    s.gpm = s.ap ? (s.g / s.ap) : 0;
    s.apm = s.ap ? (s.a / s.ap) : 0;
    s.gcpm = s.ap ? (s.gc / s.ap) : 0;
    s.ppm = s.ap ? (s.pts / s.ap) : 0;
    s.csr = s.ap ? (s.cs / s.ap * 100) : 0;
  });

  return Object.values(stats);
}

function sortRows(rows, key, dir){
  return rows.sort((a,b)=>{
    if(key === 'name'){
      const result = String(a.name).localeCompare(String(b.name), 'th');
      return dir === 'asc' ? result : -result;
    }

    const av = Number(a[key] || 0);
    const bv = Number(b[key] || 0);

    if(bv === av){
      return (b.pts || 0) - (a.pts || 0) || String(a.name).localeCompare(String(b.name), 'th');
    }

    return dir === 'desc' ? (bv - av) : (av - bv);
  });
}

function renderStats(){
  const team = getActiveTeam();
  const body = document.getElementById('statsBody');

  if(!team){
    body.innerHTML = '<div class="empty-state">สร้างทีมก่อน</div>';
    return;
  }

  const allRows = computePlayerStats(team);

  if(allRows.length === 0){
    body.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูลผู้เล่น เพิ่มผู้เล่นและบันทึกแมตช์เพื่อให้ระบบคำนวณสถิติให้อัตโนมัติ</div>';
    return;
  }

  const rankingRows = sortRows([...allRows], sortKey, sortDir);
  const detailRows = sortRows([...allRows], detailSortKey, detailSortDir);

  const rankingCols = [
    {key:'rank', label:'#'},
    {key:'name', label:'ผู้เล่น'},
    {key:'ap', label:'AP'},
    {key:'w', label:'W'},
    {key:'d', label:'D'},
    {key:'l', label:'L'},
    {key:'wpct', label:'W%'},
    {key:'g', label:'G'},
    {key:'a', label:'A'},
    {key:'gc', label:'GC'},
    {key:'gpm', label:'G/AP'},
    {key:'apm', label:'A/AP'},
    {key:'gcpm', label:'GC/AP'},
    {key:'pts', label:'PTS'},
    {key:'ppm', label:'PPM'}
  ];

  const detailCols = [
    {key:'name', label:'ผู้เล่น'},
    {key:'cs', label:'CS'},
    {key:'csr', label:'CS%'},
    {key:'csPts', label:'CS PTS'},
    {key:'sv', label:'SV'},
    {key:'saveBonus', label:'SV Bonus'},
    {key:'og', label:'OG'},
    {key:'ogPts', label:'OG PTS'},
    {key:'goalPts', label:'Goal PTS'},
    {key:'assistPts', label:'Assist PTS'}
  ];

  body.innerHTML = `
    <div class="scoring-note">
      W/D/L = ชนะ/เสมอ/แพ้ · W% = Win Rate · GC = G + A · G/AP = ประตูเฉลี่ยต่อเกม · A/AP = แอสซิสต์เฉลี่ยต่อเกม · GC/AP = มีส่วนร่วมกับประตูเฉลี่ยต่อเกม · PPM = คะแนนเฉลี่ยต่อเกม · CS% = อัตรา Clean Sheet
    </div>
    <br>

    <div class="stats-layout">
      <div>
        <div class="stats-card-title">
          Ranking หลัก
          <span>เรียงเริ่มต้นตาม PTS มากสุด</span>
        </div>

        <div class="table-scroll">
          <table class="stat-table">
            <thead>
              <tr>
                ${rankingCols.map(c=>`
                  <th data-sort-main="${c.key}" class="${sortKey===c.key?'sorted':''}">
                    ${c.label}${sortKey===c.key ? (sortDir==='desc'?' ▼':' ▲') : ''}
                  </th>
                `).join('')}
              </tr>
            </thead>
            <tbody>
              ${rankingRows.map((r, idx)=>`
                <tr>
                  <td><span class="rank-badge">${idx + 1}</span></td>
                  <td class="name">${r.name}</td>
                  <td>${r.ap}</td>
                  <td>${r.w}</td>
                  <td>${r.d}</td>
                  <td>${r.l}</td>
                  <td class="muted-cell">${r.wpct.toFixed(1)}%</td>
                  <td>${r.g}</td>
                  <td>${r.a}</td>
                  <td class="positive">${r.gc}</td>
                  <td class="muted-cell">${r.gpm.toFixed(2)}</td>
                  <td class="muted-cell">${r.apm.toFixed(2)}</td>
                  <td class="muted-cell">${r.gcpm.toFixed(2)}</td>
                  <td class="pts">${r.pts}</td>
                  <td class="positive">${r.ppm.toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="stats-card-title">
          Breakdown คะแนน
          <span>แยก CS / Save / Own Goal</span>
        </div>

        <div class="table-scroll">
          <table class="stat-table">
            <thead>
              <tr>
                ${detailCols.map(c=>`
                  <th data-sort-detail="${c.key}" class="${detailSortKey===c.key?'sorted':''}">
                    ${c.label}${detailSortKey===c.key ? (detailSortDir==='desc'?' ▼':' ▲') : ''}
                  </th>
                `).join('')}
              </tr>
            </thead>
            <tbody>
              ${detailRows.map(r=>`
                <tr>
                  <td class="name">${r.name}</td>
                  <td>${r.cs}</td>
                  <td class="muted-cell">${r.csr.toFixed(1)}%</td>
                  <td class="positive">${r.csPts}</td>
                  <td>${r.sv}</td>
                  <td class="positive">${r.saveBonus}</td>
                  <td>${r.og}</td>
                  <td class="${r.ogPts < 0 ? 'negative' : 'muted-cell'}">${r.ogPts}</td>
                  <td class="positive">${r.goalPts}</td>
                  <td class="positive">${r.assistPts}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  body.querySelectorAll('th[data-sort-main]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.sortMain;
      if(key === 'rank') return;

      if(sortKey === key){
        sortDir = sortDir === 'desc' ? 'asc' : 'desc';
      }else{
        sortKey = key;
        sortDir = key === 'name' ? 'asc' : 'desc';
      }
      renderStats();
    });
  });

  body.querySelectorAll('th[data-sort-detail]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.sortDetail;

      if(detailSortKey === key){
        detailSortDir = detailSortDir === 'desc' ? 'asc' : 'desc';
      }else{
        detailSortKey = key;
        detailSortDir = key === 'name' ? 'asc' : 'desc';
      }
      renderStats();
    });
  });
}

/* ========== MATCH HISTORY ========== */
function renderHistory(){
  const team = getActiveTeam();
  const body = document.getElementById('historyBody');

  if(!team){
    body.innerHTML = '<div class="empty-state">สร้างทีมก่อน</div>';
    return;
  }

  const matches = state.matches.filter(m=>m.teamId===team.id);

  if(matches.length === 0){
    body.innerHTML = '<div class="empty-state">ยังไม่มีแมตช์ที่บันทึกไว้</div>';
    return;
  }

  const resultLabel = {win:'✅ ชนะ', draw:'➖ เสมอ', loss:'❌ แพ้'};

  body.innerHTML = matches.map(m=>`
    <div class="match-item">
      <div class="match-head">
        <div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div>
        <div class="match-score">${m.homeScore} : ${m.awayScore}</div>
      </div>

      <div class="match-meta">
        <span>${m.date || '—'}</span>
        ${m.league ? `<span>${m.league}</span>` : ''}
        <span>${resultLabel[m.result]}</span>
        <span>ลงเล่น ${m.lineup ? m.lineup.length : '—'} คน</span>
      </div>

      ${m.lineup && m.lineup.length ? `
        <div class="match-lineup">
          ${m.lineup.map(item=>{
            const name = getLineupName(item);
            const pos = getLineupPos(item);
            return `<span class="lineup-tag">👤 ${name} · ${POSITION_LABELS[pos] || pos}</span>`;
          }).join('')}
        </div>
      ` : ''}

      ${m.events.length ? `
        <div class="match-events">
          ${m.events.map(ev=>{
            const icon =
              ev.type==='goal' ? '⚽' :
              ev.type==='save' ? '🧤' :
              ev.type==='og' ? '🥅' :
              ev.type==='yellow' ? '🟨' : '🟥';

            const label =
              ev.type==='save' ? 'GK Save' :
              ev.type==='og' ? 'Own Goal (-2)' : '';
            const minute = ev.minute ? `${ev.minute}'` : '';
            const assist = ev.assistPlayer ? ` (แอสซิสต์: ${ev.assistPlayer})` : '';
            return `<div>${icon} ${minute} ${ev.player} ${label}${assist}</div>`;
          }).join('')}
        </div>
      ` : ''}

      <button class="match-delete" data-delete="${m.id}">ลบแมตช์นี้</button>
    </div>
  `).join('');

  body.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('ลบแมตช์นี้? สถิติที่เกี่ยวข้องจะถูกคำนวณใหม่ทันที')) return;

      const { error } = await supabaseClient
        .from('matches')
        .delete()
        .eq('id', btn.dataset.delete);

      if(error){
        console.error(error);
        showToast('ลบแมตช์ไม่สำเร็จ');
        return;
      }

      await loadState();
      renderAll();
      showToast('ลบแมตช์แล้ว');
    });
  });
}

/* ========== COLLAPSIBLE SECTIONS ========== */
document.querySelectorAll('.section-head').forEach(head=>{
  head.addEventListener('click', ()=>{
    const target = document.getElementById(head.dataset.target);
    target.classList.toggle('collapsed');
    head.querySelector('.chev').textContent = target.classList.contains('collapsed') ? '▸' : '▾';
  });
});

/* ========== RENDER ALL ========== */
function renderAll(){
  renderTeamTabs();
  renderSummary();
  renderStats();
  renderHistory();
}

/* ========== INIT ========== */
(async function init(){
  await loadState();
  renderAll();
})();
</script>
</body>
</html>

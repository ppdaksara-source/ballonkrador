<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Match Ledger — Supabase</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root{
    --bg:#07110b;
    --bg-soft:#0b1710;
    --surface:#101f16;
    --surface-2:#14261b;
    --surface-3:#1a3022;
    --field:#17361f;
    --field-dark:#0f2115;
    --border:rgba(217,228,184,.16);
    --border-strong:rgba(217,228,184,.28);
    --text:#f4f3e8;
    --muted:#a9b995;
    --muted-2:#71815f;
    --gold:#d7b45a;
    --gold-2:#f0d27a;
    --danger:#d85c5c;
    --danger-bg:rgba(216,92,92,.14);
    --success:#9ccf73;
    --shadow:0 22px 60px rgba(0,0,0,.35);
    --radius:18px;
    --radius-sm:12px;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    min-height:100vh;
    color:var(--text);
    font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background:
      radial-gradient(circle at 18% -8%, rgba(215,180,90,.22), transparent 28%),
      radial-gradient(circle at 90% 6%, rgba(156,207,115,.12), transparent 30%),
      linear-gradient(180deg, #08100b 0%, #050806 100%);
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.014) 1px, transparent 1px);
    background-size:42px 42px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.7), transparent 82%);
  }

  .wrap{
    position:relative;
    max-width:920px;
    margin:0 auto;
    padding:24px 14px 80px;
  }

  h1,h2,h3{
    margin:0;
    letter-spacing:-.02em;
  }

  button, input, select{
    font:inherit;
  }

  button{
    -webkit-tap-highlight-color:transparent;
  }

  /* ===== Header ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:16px;
    padding:18px;
    border:1px solid var(--border);
    border-radius:24px;
    background:
      linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.025)),
      rgba(16,31,22,.8);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }

  .brand{
    position:relative;
    font-weight:900;
    font-size:clamp(22px, 5vw, 38px);
    line-height:.95;
    letter-spacing:-.06em;
  }

  .brand::after{
    content:"Cruizero League";
    display:block;
    margin-top:8px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .brand span{
    color:var(--gold-2);
    text-shadow:0 0 28px rgba(215,180,90,.28);
  }

  /* ===== Team tabs ===== */
  .team-tabs{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:4px 2px 12px;
    margin-bottom:8px;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }

  .team-tabs::-webkit-scrollbar{display:none;}

  .team-tab,
  .add-team-btn{
    flex-shrink:0;
    border-radius:999px;
    padding:10px 15px;
    font-size:13px;
    font-weight:800;
    cursor:pointer;
    white-space:nowrap;
    transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease;
  }

  .team-tab{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
    background:rgba(255,255,255,.045);
    border:1px solid var(--border);
  }

  .team-tab:hover,
  .add-team-btn:hover{
    transform:translateY(-1px);
    border-color:var(--border-strong);
  }

  .team-tab.active{
    color:#11170f;
    border-color:rgba(215,180,90,.8);
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    box-shadow:0 12px 30px rgba(215,180,90,.18);
  }

  .team-tab .dot{
    width:9px;
    height:9px;
    border-radius:999px;
    flex-shrink:0;
    box-shadow:0 0 0 3px rgba(255,255,255,.08);
  }

  .add-team-btn{
    color:var(--gold-2);
    background:rgba(215,180,90,.08);
    border:1px dashed rgba(215,180,90,.45);
  }

  /* ===== Summary ===== */
  .summary{
    position:relative;
    overflow:hidden;
    border:1px solid var(--border);
    border-radius:28px;
    padding:22px;
    margin-bottom:18px;
    background:
      radial-gradient(circle at 100% 0%, rgba(215,180,90,.18), transparent 34%),
      linear-gradient(135deg, rgba(255,255,255,.075), rgba(255,255,255,.022)),
      var(--surface);
    box-shadow:var(--shadow);
  }

  .summary::before{
    content:"";
    position:absolute;
    inset:auto -60px -100px auto;
    width:240px;
    height:240px;
    border-radius:50%;
    border:1px solid rgba(217,228,184,.1);
  }

  .summary .teamname{
    position:relative;
    font-size:clamp(25px, 7vw, 46px);
    line-height:1;
    font-weight:950;
    letter-spacing:-.07em;
    color:var(--text);
    margin-bottom:16px;
  }

  .summary .teamname .editbtn{
    display:inline-flex;
    align-items:center;
    vertical-align:middle;
    margin-left:10px;
    padding:6px 10px;
    border-radius:999px;
    font-size:11px;
    font-weight:800;
    letter-spacing:0;
    color:var(--gold-2);
    background:rgba(215,180,90,.1);
    cursor:pointer;
    text-decoration:none;
  }

  .ledger{
    position:relative;
    display:grid;
    grid-template-columns:repeat(5, minmax(0, 1fr));
    gap:10px;
  }

  .ledger span{
    min-height:68px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:5px;
    padding:12px;
    border-radius:18px;
    color:var(--muted);
    font-size:11px;
    font-weight:800;
    letter-spacing:.07em;
    text-transform:uppercase;
    background:rgba(255,255,255,.045);
    border:1px solid var(--border);
  }

  .ledger b{
    color:var(--gold-2);
    font-size:19px;
    letter-spacing:-.04em;
  }

  /* ===== Sections ===== */
  .section{
    overflow:hidden;
    margin-bottom:14px;
    border:1px solid var(--border);
    border-radius:24px;
    background:rgba(16,31,22,.72);
    backdrop-filter:blur(14px);
    box-shadow:0 14px 36px rgba(0,0,0,.22);
  }

  .section-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 18px;
    cursor:pointer;
    border-bottom:1px solid var(--border);
    background:linear-gradient(90deg, rgba(255,255,255,.06), rgba(255,255,255,.015));
  }

  .section-head h2{
    font-size:14px;
    font-weight:950;
    color:var(--text);
    letter-spacing:-.01em;
  }

  .section-head .chev{
    width:28px;
    height:28px;
    display:grid;
    place-items:center;
    border-radius:999px;
    color:var(--gold-2);
    background:rgba(215,180,90,.09);
  }

  .section-body{
    padding:18px;
  }

  .section-body.collapsed{
    display:none;
  }

  /* ===== Inputs ===== */
  .row{
    display:flex;
    gap:10px;
    margin-bottom:12px;
  }

  .row > *{ flex:1; }

  label{
    display:block;
    margin-bottom:6px;
    font-size:11px;
    font-weight:900;
    letter-spacing:.08em;
    color:var(--muted);
    text-transform:uppercase;
  }

  input, select{
    width:100%;
    min-height:44px;
    padding:11px 12px;
    border-radius:14px;
    border:1px solid var(--border);
    color:var(--text);
    background:rgba(255,255,255,.05);
    outline:none;
    transition:border-color .16s ease, box-shadow .16s ease, background .16s ease;
  }

  input:focus, select:focus{
    border-color:rgba(215,180,90,.75);
    box-shadow:0 0 0 4px rgba(215,180,90,.11);
    background:rgba(255,255,255,.075);
  }

  input::placeholder{
    color:rgba(169,185,149,.48);
  }

  .vs-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
  }

  .vs-row .vs{
    flex:0 0 auto;
    margin-top:22px;
    width:42px;
    height:42px;
    display:grid;
    place-items:center;
    border-radius:999px;
    color:#11170f;
    font-size:12px;
    font-weight:950;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
  }

  .score-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin:18px 0;
    padding:16px;
    border-radius:22px;
    background:
      linear-gradient(90deg, rgba(255,255,255,.04), rgba(255,255,255,.015)),
      rgba(0,0,0,.13);
    border:1px solid var(--border);
  }

  .score-box{
    width:78px;
    height:72px;
    text-align:center;
    font-size:34px;
    font-weight:950;
    border-radius:18px;
    color:var(--gold-2);
    background:rgba(0,0,0,.26);
    border:1px solid rgba(215,180,90,.32);
  }

  .score-colon{
    margin-top:18px;
    font-size:26px;
    font-weight:950;
    color:var(--muted-2);
  }

  .result-pill-row{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:8px;
    margin-bottom:14px;
  }

  .result-pill{
    text-align:center;
    padding:12px 10px;
    border-radius:16px;
    font-size:13px;
    border:1px solid var(--border);
    color:var(--muted);
    cursor:pointer;
    font-weight:900;
    background:rgba(255,255,255,.045);
    transition:transform .16s ease, background .16s ease, border-color .16s ease;
  }

  .result-pill:hover{
    transform:translateY(-1px);
    border-color:var(--border-strong);
  }

  .result-pill.active.win{
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    color:#11170f;
    border-color:var(--gold);
  }

  .result-pill.active.draw{
    background:linear-gradient(135deg, #cfd8be, #8fa27b);
    color:#11170f;
    border-color:#9eb089;
  }

  .result-pill.active.loss{
    background:linear-gradient(135deg, #e67777, #b84747);
    color:#fff;
    border-color:#d85c5c;
  }

  /* ===== Event ===== */
  .event-block{
    margin-top:16px;
    padding-top:16px;
    border-top:1px dashed var(--border-strong);
  }

  .event-block h3{
    margin-bottom:12px;
    font-size:12px;
    font-weight:950;
    color:var(--muted);
    letter-spacing:.08em;
    text-transform:uppercase;
  }

  .event-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    align-items:flex-end;
    margin-bottom:10px;
    padding:10px;
    border:1px solid var(--border);
    border-radius:18px;
    background:rgba(255,255,255,.035);
  }

  .event-row select,
  .event-row input{
    min-height:40px;
    font-size:13px;
  }

  .ev-player{ flex:1.6; min-width:120px; }
  .ev-min{ flex:.7; min-width:70px; }
  .ev-type{ flex:1.1; min-width:108px; }
  .ev-assist{ flex:1.4; min-width:120px; }

  .ev-remove{
    align-self:center;
    width:34px;
    height:34px;
    border:none;
    border-radius:999px;
    color:var(--danger);
    background:var(--danger-bg);
    font-size:20px;
    cursor:pointer;
  }

  .add-event-btn,
  .save-btn,
  .roster-add button{
    border:none;
    cursor:pointer;
    transition:transform .16s ease, filter .16s ease;
  }

  .add-event-btn{
    width:100%;
    padding:12px 0;
    border-radius:16px;
    font-size:13px;
    font-weight:900;
    color:var(--gold-2);
    border:1px dashed rgba(215,180,90,.42);
    background:rgba(215,180,90,.08);
  }

  .add-event-btn:hover,
  .save-btn:hover,
  .roster-add button:hover{
    transform:translateY(-1px);
    filter:brightness(1.05);
  }

  .save-btn{
    width:100%;
    margin-top:16px;
    padding:15px 0;
    border-radius:18px;
    color:#11170f;
    font-size:15px;
    font-weight:950;
    letter-spacing:-.01em;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    box-shadow:0 16px 32px rgba(215,180,90,.18);
  }

  .save-btn:disabled{
    opacity:.65;
    cursor:not-allowed;
    transform:none;
  }

  /* ===== Roster ===== */
  .roster-add{
    display:flex;
    gap:10px;
    margin-bottom:14px;
  }

  .roster-add input{ flex:1; }

  .roster-add button{
    flex:0 0 auto;
    padding:0 18px;
    border-radius:15px;
    color:#11170f;
    font-weight:950;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
  }

  .roster-list,
  .lineup-list,
  .bench-list{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }

  .roster-chip,
  .lineup-chip,
  .bench-chip{
    display:flex;
    align-items:center;
    gap:8px;
    border-radius:999px;
    padding:8px 12px;
    font-size:13px;
    font-weight:800;
    color:var(--muted);
    background:rgba(255,255,255,.052);
    border:1px solid var(--border);
  }

  .roster-chip button{
    width:20px;
    height:20px;
    padding:0;
    display:grid;
    place-items:center;
    border:none;
    border-radius:999px;
    color:var(--danger);
    background:var(--danger-bg);
    cursor:pointer;
  }

  .empty-roster,
  .empty-state,
  .formation-empty{
    color:var(--muted-2);
    font-size:13px;
    padding:20px 0;
    text-align:center;
  }

  .lineup-chip{
    cursor:pointer;
    color:var(--muted-2);
  }

  .lineup-chip.selected{
    color:#11170f;
    border-color:var(--gold);
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
  }

  .lineup-chip.lineup-all{
    border-style:dashed;
    color:var(--gold-2);
    background:rgba(215,180,90,.08);
  }

  .lineup-hint{
    margin-top:8px;
    font-size:11px;
    color:var(--muted-2);
  }

  /* ===== Stats ===== */
  .table-scroll{
    overflow-x:auto;
    border-radius:18px;
    border:1px solid var(--border);
  }

  .stat-table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    min-width:620px;
    background:rgba(255,255,255,.025);
  }

  .stat-table th{
    position:sticky;
    top:0;
    z-index:1;
    text-align:left;
    padding:12px 10px;
    color:var(--muted);
    font-size:11px;
    font-weight:950;
    letter-spacing:.08em;
    text-transform:uppercase;
    white-space:nowrap;
    cursor:pointer;
    background:rgba(11,23,16,.96);
    border-bottom:1px solid var(--border);
  }

  .stat-table th.sorted{
    color:var(--gold-2);
  }

  .stat-table td{
    padding:12px 10px;
    border-bottom:1px solid rgba(217,228,184,.08);
    color:var(--text);
    white-space:nowrap;
  }

  .stat-table tr:last-child td{
    border-bottom:none;
  }

  .stat-table td.name{
    color:var(--gold-2);
    font-weight:950;
  }

  .stat-table tr:hover td{
    background:rgba(255,255,255,.035);
  }

  /* ===== Match History ===== */
  .match-item{
    margin-bottom:10px;
    padding:14px;
    border:1px solid var(--border);
    border-radius:18px;
    background:rgba(255,255,255,.035);
  }

  .match-item:last-child{
    margin-bottom:0;
  }

  .match-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }

  .match-teams{
    color:var(--text);
    font-weight:950;
    letter-spacing:-.03em;
  }

  .match-score{
    flex:0 0 auto;
    min-width:62px;
    text-align:center;
    padding:8px 10px;
    border-radius:14px;
    color:#11170f;
    font-weight:950;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
  }

  .match-meta{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-top:9px;
    color:var(--muted-2);
    font-size:11px;
  }

  .match-meta span{
    padding:4px 8px;
    border-radius:999px;
    background:rgba(255,255,255,.045);
    border:1px solid var(--border);
  }

  .match-events{
    margin-top:10px;
    padding:10px;
    border-radius:14px;
    color:var(--muted);
    font-size:12px;
    background:rgba(0,0,0,.14);
  }

  .match-events div{
    margin-bottom:4px;
  }

  .match-events div:last-child{
    margin-bottom:0;
  }

  .match-delete{
    margin-top:10px;
    padding:7px 10px;
    border-radius:12px;
    cursor:pointer;
    color:var(--danger);
    border:1px solid rgba(216,92,92,.34);
    background:var(--danger-bg);
    font-size:11px;
    font-weight:900;
  }

  /* ===== Toast & Modal ===== */
  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(8px);
    z-index:50;
    max-width:calc(100vw - 32px);
    opacity:0;
    pointer-events:none;
    padding:12px 18px;
    border-radius:999px;
    color:#11170f;
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
    font-size:13px;
    font-weight:950;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
    transition:opacity .25s, transform .25s;
  }

  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    background:rgba(0,0,0,.62);
    backdrop-filter:blur(8px);
  }

  .modal-overlay.show{
    display:flex;
  }

  .modal-box{
    width:100%;
    max-width:370px;
    padding:20px;
    border-radius:24px;
    border:1px solid var(--border-strong);
    background:
      linear-gradient(135deg, rgba(255,255,255,.08), rgba(255,255,255,.025)),
      var(--surface);
    box-shadow:var(--shadow);
  }

  .modal-box h3{
    margin-bottom:14px;
    font-size:18px;
    font-weight:950;
    letter-spacing:-.04em;
  }

  .modal-actions{
    display:flex;
    gap:10px;
    margin-top:16px;
  }

  .modal-actions button{
    flex:1;
    min-height:42px;
    border-radius:14px;
    cursor:pointer;
    color:var(--muted);
    border:1px solid var(--border);
    background:rgba(255,255,255,.045);
    font-weight:900;
  }

  .modal-actions button.primary{
    color:#11170f;
    border-color:var(--gold);
    background:linear-gradient(135deg, var(--gold-2), var(--gold));
  }

  .color-swatches{
    display:flex;
    gap:10px;
    margin-top:10px;
    flex-wrap:wrap;
  }

  .color-swatch{
    width:30px;
    height:30px;
    border-radius:999px;
    cursor:pointer;
    border:3px solid transparent;
    box-shadow:0 0 0 1px rgba(255,255,255,.16);
  }

  .color-swatch.selected{
    border-color:var(--text);
  }

  /* ===== Formation board ===== */
  .pitch-wrap{
    position:relative;
    width:100%;
    max-width:430px;
    margin:0 auto;
    aspect-ratio:.74;
    overflow:hidden;
    border-radius:28px;
    border:1px solid rgba(217,228,184,.2);
    background:
      radial-gradient(circle at 50% 35%, rgba(215,180,90,.08), transparent 36%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 54px, transparent 54px, transparent 108px),
      linear-gradient(180deg, var(--field), var(--field-dark));
    box-shadow:inset 0 0 70px rgba(0,0,0,.28);
  }

  .pitch-lines{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:.9;
  }

  .pitch-lines svg{
    width:100%;
    height:100%;
  }

  .pitch-slot{
    position:absolute;
    width:78px;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    cursor:pointer;
  }

  .pitch-slot .slot-pos-label{
    margin-bottom:4px;
    padding:3px 7px;
    border-radius:999px;
    font-size:10px;
    font-weight:950;
    color:var(--gold-2);
    background:rgba(0,0,0,.32);
    border:1px solid rgba(215,180,90,.18);
  }

  .pitch-slot .slot-avatar{
    width:52px;

<script>
/*
  ================================
  1) ใส่ Supabase URL และ anon key ตรงนี้

*/
const SUPABASE_URL = 'https://atzazaxtxhzrvqxlhhqj.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_jmf71edz6dGKqsEfNJMWvA_O_x6xtkY';

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const ACTIVE_TEAM_KEY = 'match_ledger_active_team_id_v1';

const TEAM_COLORS = ['#c9a14a','#9e3b3b','#3a6ea5','#4a7a4a','#7a4a8a','#888888','#1a1a1a','#d9d9d9'];

let state = {
  teams: [],
  matches: [],
  activeTeamId: localStorage.getItem(ACTIVE_TEAM_KEY) || null
};

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

function uid(prefix){
  return prefix + '_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
}

function getActiveTeam(){
  return state.teams.find(t=>t.id === state.activeTeamId);
}

function saveActiveTeamId(){
  if(state.activeTeamId){
    localStorage.setItem(ACTIVE_TEAM_KEY, state.activeTeamId);
  }
}

async function loadState(){
  try{
    const { data: teams, error: teamError } = await supabaseClient
      .from('teams')
      .select('*')
      .order('created_at', { ascending:true });

    if(teamError) throw teamError;

    const { data: matches, error: matchError } = await supabaseClient
      .from('matches')
      .select('*')
      .order('created_at', { ascending:false });

    if(matchError) throw matchError;

    state.teams = (teams || []).map(t => ({
      id: t.id,
      name: t.name,
      color: t.color,
      roster: Array.isArray(t.roster) ? t.roster : [],
      formation: t.formation || {}
    }));

    state.matches = (matches || []).map(m => ({
      id: m.id,
      teamId: m.team_id,
      homeTeam: m.home_team,
      awayTeam: m.away_team,
      homeScore: Number(m.home_score || 0),
      awayScore: Number(m.away_score || 0),
      date: m.match_date,
      league: m.league || '',
      result: m.result,
      lineup: Array.isArray(m.lineup) ? m.lineup : [],
      events: Array.isArray(m.events) ? m.events : []
    }));

    if(state.teams.length === 0){
      await seedDefaultTeams();
      return await loadState();
    }

    const stillHasActiveTeam = state.teams.some(t => t.id === state.activeTeamId);
    if(!state.activeTeamId || !stillHasActiveTeam){
      state.activeTeamId = state.teams[0].id;
      saveActiveTeamId();
    }

  }catch(e){
    console.error('load failed', e);
    showToast('โหลดข้อมูลไม่สำเร็จ เช็ก Supabase URL / KEY / ตาราง');
  }
}

/* ========== SUMMARY ========== */
function computeTeamSummary(team){
  const matches = state.matches.filter(m=>m.teamId===team.id);
  let w=0,d=0,l=0,gf=0,ga=0,cs=0;

  matches.forEach(m=>{
    if(m.result==='win') w++;
    else if(m.result==='draw') d++;
    else l++;

    gf += m.homeScore;
    ga += m.awayScore;

    if(m.awayScore===0) cs++;
  });

  const ap = matches.length;
  const wpct = ap ? (w/ap*100) : 0;
  return {ap,w,d,l,gf,ga,cs,wpct};
}

  const team = getActiveTeam();

  `;

  });
}

    });

    row.querySelector('.ev-type-select').addEventListener('change', e=>{
      formEvents[idx].type = e.target.value;
      if(e.target.value !== 'goal') formEvents[idx].assistPlayer = '';
      renderEventRows();
    });

    const assistSel = row.querySelector('.ev-assist-select');
    if(assistSel){
      assistSel.value = ev.assistPlayer || '';
      assistSel.addEventListener('change', e=>{
        formEvents[idx].assistPlayer = e.target.value;
      });
    }
  });

  wrap.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      formEvents.splice(parseInt(btn.dataset.remove, 10), 1);
      renderEventRows();
    });
  });
}

async function saveMatch(){
  const team = getActiveTeam();
  if(!team) return;

  if(formLineup.length === 0){
    showToast('เลือกผู้ลงเล่นอย่างน้อย 1 คนก่อนบันทึก');
    return;
  }

  const saveBtn = document.getElementById('saveMatchBtn');
  saveBtn.disabled = true;
  saveBtn.textContent = 'กำลังบันทึก...';

  const lineupSet = new Set(formLineup);
  formEvents.forEach(ev=>{
    if(ev.player) lineupSet.add(ev.player);
    if(ev.assistPlayer) lineupSet.add(ev.assistPlayer);
  });

  const homeTeam = document.getElementById('homeTeamInput').value.trim() || team.name;
  const awayTeam = document.getElementById('awayTeamInput').value.trim() || 'ทีมเยือน';
  const homeScore = parseInt(document.getElementById('homeScoreInput').value, 10) || 0;
  const awayScore = parseInt(document.getElementById('awayScoreInput').value, 10) || 0;
  const date = document.getElementById('matchDateInput').value || null;
  const league = document.getElementById('leagueInput').value.trim();

  const match = {
    id: uid('match'),
    team_id: team.id,
    home_team: homeTeam,
    away_team: awayTeam,
    home_score: homeScore,
    away_score: awayScore,
    match_date: date,
    league,
    result: formResult,
    lineup: Array.from(lineupSet),
    events: formEvents.filter(e=>e.player).map(e=>({...e}))
  };

  const { error } = await supabaseClient
    .from('matches')
    .insert(match);

  if(error){
    console.error(error);
    showToast('บันทึกแมตช์ไม่สำเร็จ');
    saveBtn.disabled = false;
    saveBtn.textContent = '+ บันทึกแมตช์';
    return;
  }

  formEvents = [];
  formLineup = [];
  formResult = 'win';

  await loadState();
  renderAll();
  showToast('บันทึกแมตช์แล้ว ✅');
}

/* ========== ROSTER ========== */
function renderRoster(){
  const team = getActiveTeam();
  const body = document.getElementById('rosterBody');

  if(!team){
    body.innerHTML = '<div class="empty-state">สร้างทีมก่อน</div>';
    return;
  }

  body.innerHTML = `
    <div class="roster-add">
      <input type="text" id="newPlayerInput" placeholder="ชื่อผู้เล่นใหม่">
      <button id="addPlayerBtn">+ เพิ่ม</button>
    </div>
    <div class="roster-list" id="rosterList">
      ${team.roster.length ? team.roster.map(p=>`
        <div class="roster-chip">${p} <button data-remove-player="${p}">×</button></div>
      `).join('') : '<div class="empty-roster">ยังไม่มีผู้เล่นในทีมนี้</div>'}
    </div>
  `;

  document.getElementById('addPlayerBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newPlayerInput');
    const name = input.value.trim();
    if(!name) return;

    if(team.roster.includes(name)){
      showToast('มีชื่อนี้ในทีมแล้ว');
      return;
    }

    const newRoster = [...team.roster, name];
    const ok = await updateTeam(team.id, { roster: newRoster });

    if(ok){
      await loadState();
      renderAll();
      showToast('เพิ่ม ' + name + ' แล้ว');
    }
  });

  body.querySelectorAll('[data-remove-player]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const name = btn.dataset.removePlayer;
      if(!confirm(`ลบ ${name} ออกจากทีม? (สถิติแมตช์เก่ายังเก็บไว้)`)) return;

      const newRoster = team.roster.filter(p=>p!==name);

      const newFormation = {...(team.formation || {})};
      Object.keys(newFormation).forEach(slot=>{
        if(newFormation[slot] === name){
          delete newFormation[slot];
        }
      });

      const ok = await updateTeam(team.id, {
        roster: newRoster,
        formation: newFormation
      });

      if(ok){
        formLineup = formLineup.filter(p => p !== name);
        renderAll();
        showToast('ลบผู้เล่นแล้ว');
      }
    });
  });
}

/* ========== STATS TABLE ========== */
let sortKey = 'wpct';
let sortDir = -1;

function computePlayerStats(team){
  const matches = state.matches.filter(m=>m.teamId===team.id);
  const stats = {};

  team.roster.forEach(p=>{
    stats[p] = {name:p, ap:0, w:0, d:0, l:0, g:0, a:0, cs:0};
  });

  matches.forEach(m=>{
    let playersInMatch = (m.lineup && m.lineup.length) ? new Set(m.lineup) : new Set();

    if(playersInMatch.size === 0){
      m.events.forEach(ev=>{
        if(ev.player) playersInMatch.add(ev.player);
        if(ev.assistPlayer) playersInMatch.add(ev.assistPlayer);
      });
    }

    playersInMatch.forEach(p=>{
      if(!stats[p]){
        stats[p] = {name:p, ap:0, w:0, d:0, l:0, g:0, a:0, cs:0};
      }
      stats[p].ap++;
      if(m.result==='win') stats[p].w++;
      else if(m.result==='draw') stats[p].d++;
      else stats[p].l++;
      if(m.awayScore===0) stats[p].cs++;
    });

    m.events.forEach(ev=>{
      if(ev.player && !stats[ev.player]){
        stats[ev.player] = {name:ev.player, ap:0, w:0, d:0, l:0, g:0, a:0, cs:0};
      }
      if(ev.assistPlayer && !stats[ev.assistPlayer]){
        stats[ev.assistPlayer] = {name:ev.assistPlayer, ap:0, w:0, d:0, l:0, g:0, a:0, cs:0};
      }

      if(ev.type === 'goal'){
        if(ev.player) stats[ev.player].g++;
        if(ev.assistPlayer) stats[ev.assistPlayer].a++;
      }
    });
  });

  return Object.values(stats).map(s=>({
    ...s,
    wpct: s.ap ? (s.w/s.ap*100) : 0
  }));
}

function renderStats(){
  const team = getActiveTeam();
  const body = document.getElementById('statsBody');

  if(!team){
    body.innerHTML = '<div class="empty-state">สร้างทีมก่อน</div>';
    return;
  }

  const rows = computePlayerStats(team);

  if(rows.length === 0){
    body.innerHTML = '<div class="empty-state">ยังไม่มีข้อมูลผู้เล่น เพิ่มผู้เล่นและบันทึกแมตช์เพื่อให้ระบบคำนวณสถิติให้อัตโนมัติ</div>';
    return;
  }

  rows.sort((a,b)=>{
    if(sortKey === 'name'){
      return sortDir * String(a.name).localeCompare(String(b.name), 'th');
    }
    return sortDir * ((b[sortKey] || 0) - (a[sortKey] || 0));
  });

  const cols = [
    {key:'name', label:'ผู้เล่น'},
    {key:'ap', label:'AP'},
    {key:'w', label:'W'},
    {key:'d', label:'D'},
    {key:'l', label:'L'},
    {key:'wpct', label:'W%'},
    {key:'g', label:'G'},
    {key:'a', label:'A'},
    {key:'cs', label:'CS'}
  ];

  body.innerHTML = `
    <div class="table-scroll">
      <table class="stat-table">
        <thead>
          <tr>
            ${cols.map(c=>`
              <th data-sort="${c.key}" class="${sortKey===c.key?'sorted':''}">
                ${c.label}${sortKey===c.key ? (sortDir===1?' ▲':' ▼') : ''}
              </th>
            `).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td class="name">${r.name}</td>
              <td>${r.ap}</td>
              <td>${r.w}</td>
              <td>${r.d}</td>
              <td>${r.l}</td>
              <td>${r.wpct.toFixed(1)}%</td>
              <td>${r.g}</td>
              <td>${r.a}</td>
              <td>${r.cs}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  body.querySelectorAll('th[data-sort]').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.sort;
      if(sortKey === key){
        sortDir *= -1;
      }else{
        sortKey = key;
        sortDir = -1;
      }
      renderStats();
    });
  });
}

/* ========== MATCH HISTORY ========== */
function renderHistory(){
  const team = getActiveTeam();
  const body = document.getElementById('historyBody');

  if(!team){
    body.innerHTML = '<div class="empty-state">สร้างทีมก่อน</div>';
    return;
  }

  const matches = state.matches.filter(m=>m.teamId===team.id);

  if(matches.length === 0){
    body.innerHTML = '<div class="empty-state">ยังไม่มีแมตช์ที่บันทึกไว้</div>';
    return;
  }

  const resultLabel = {win:'✅ ชนะ', draw:'➖ เสมอ', loss:'❌ แพ้'};

  body.innerHTML = matches.map(m=>`
    <div class="match-item">
      <div class="match-head">
        <div class="match-teams">${m.homeTeam} vs ${m.awayTeam}</div>
        <div class="match-score">${m.homeScore} : ${m.awayScore}</div>
      </div>

      <div class="match-meta">
        <span>${m.date || '—'}</span>
        ${m.league ? `<span>${m.league}</span>` : ''}
        <span>${resultLabel[m.result]}</span>
        <span>ลงเล่น ${m.lineup ? m.lineup.length : '—'} คน</span>
      </div>

      ${m.events.length ? `
        <div class="match-events">
          ${m.events.map(ev=>{
            const icon = ev.type==='goal' ? '⚽' : ev.type==='yellow' ? '🟨' : '🟥';
            const minute = ev.minute ? `${ev.minute}'` : '';
            const assist = ev.assistPlayer ? ` (แอสซิสต์: ${ev.assistPlayer})` : '';
            return `<div>${icon} ${minute} ${ev.player}${assist}</div>`;
          }).join('')}
        </div>
      ` : ''}

      <button class="match-delete" data-delete="${m.id}">ลบแมตช์นี้</button>
    </div>
  `).join('');

  body.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('ลบแมตช์นี้? สถิติที่เกี่ยวข้องจะถูกคำนวณใหม่ทันที')) return;

      const { error } = await supabaseClient
        .from('matches')
        .delete()
        .eq('id', btn.dataset.delete);

      if(error){
        console.error(error);
        showToast('ลบแมตช์ไม่สำเร็จ');
        return;
      }

      await loadState();
      renderAll();
      showToast('ลบแมตช์แล้ว');
    });
  });
}

/* ========== FORMATION BOARD ========== */
const FORMATION_SLOTS = [
  { key:'GK', label:'GK', x:50, y:92 },
  { key:'LB', label:'LB', x:22, y:74 },
  { key:'RB', label:'RB', x:78, y:74 },
  { key:'CM', label:'CM', x:50, y:50 },
  { key:'LW', label:'LW', x:22, y:20 },
  { key:'RW', label:'RW', x:78, y:20 }
];

let activePickerSlot = null;

function ensureFormation(team){
  if(!team.formation) team.formation = {};
  return team.formation;
}

function pitchLinesSVG(){
  return `
    <svg viewBox="0 0 100 135" preserveAspectRatio="none">
      <rect x="2" y="2" width="96" height="131" fill="none" stroke="#7c8a63" stroke-width="0.6" />
      <line x1="2" y1="67.5" x2="98" y2="67.5" stroke="#7c8a63" stroke-width="0.5" />
      <circle cx="50" cy="67.5" r="11" fill="none" stroke="#7c8a63" stroke-width="0.5" />
      <rect x="28" y="2" width="44" height="16" fill="none" stroke="#7c8a63" stroke-width="0.5" />
      <rect x="28" y="117" width="44" height="16" fill="none" stroke="#7c8a63" stroke-width="0.5" />
      <path d="M 38 18 A 12 12 0 0 0 62 18" fill="none" stroke="#7c8a63" stroke-width="0.5" />
      <path d="M 38 117 A 12 12 0 0 1 62 117" fill="none" stroke="#7c8a63" stroke-width="0.5" />
    </svg>
  `;
}

function renderFormation(){
  const team = getActiveTeam();
  const body = document.getElementById('formationBody');

  if(!team){
    body.innerHTML = '<div class="formation-empty">สร้างทีมก่อน</div>';
    return;
  }

  if(team.roster.length === 0){
    body.innerHTML = '<div class="formation-empty">เพิ่มผู้เล่นในทีมก่อน เพื่อจัด formation</div>';
    return;
  }

  const formation = ensureFormation(team);

  Object.keys(formation).forEach(slotKey => {
    if(formation[slotKey] && !team.roster.includes(formation[slotKey])){
      delete formation[slotKey];
    }
  });

  const assignedNames = new Set(Object.values(formation).filter(Boolean));
  const benchPlayers = team.roster.filter(p => !assignedNames.has(p));

  const slotsHTML = FORMATION_SLOTS.map(slot => {
    const assigned = formation[slot.key];
    const filled = !!assigned;

    return `
      <div class="pitch-slot ${filled?'filled':'empty'}" style="left:${slot.x}%; top:${slot.y}%;" data-slot="${slot.key}">
        <div class="slot-pos-label">${slot.label}</div>
        <div class="slot-avatar">${filled ? assigned.slice(0,2).toUpperCase() : '+'}</div>
        <div class="slot-name">${filled ? assigned : 'ว่าง'}</div>
      </div>
    `;
  }).join('');

  body.innerHTML = `
    <div class="pitch-wrap">
      <div class="pitch-lines">${pitchLinesSVG()}</div>
      ${slotsHTML}
    </div>

    <div class="formation-hint">แตะตำแหน่งบนสนามเพื่อเลือกหรือเปลี่ยนผู้เล่น</div>

    <div class="bench-block">
      <h3>ตัวสำรอง (${benchPlayers.length})</h3>
      <div class="bench-list">
        ${benchPlayers.length ? benchPlayers.map(p=>`<div class="bench-chip">${p}</div>`).join('') : '<div class="bench-chip unassigned">ไม่มีตัวสำรอง</div>'}
      </div>
    </div>
  `;

  body.querySelectorAll('.pitch-slot').forEach(slotEl => {
    slotEl.addEventListener('click', () => openPositionPicker(team, slotEl.dataset.slot));
  });
}

function openPositionPicker(team, slotKey){
  activePickerSlot = { teamId: team.id, slotKey };

  const slotMeta = FORMATION_SLOTS.find(s=>s.key===slotKey);
  document.getElementById('pickerTitle').textContent = `เลือกผู้เล่นตำแหน่ง ${slotMeta.label}`;

  const formation = ensureFormation(team);
  const currentlyHere = formation[slotKey];

  const list = document.getElementById('pickerList');
  list.innerHTML = team.roster.map(p => {
    const isHere = p === currentlyHere;
    const elsewhereSlot = Object.entries(formation).find(([k,v])=>v===p && k!==slotKey);

    return `
      <div class="picker-option" data-player="${p}" style="${isHere?'border-color:var(--gold);':''}">
        <span>${p}</span>
        <span class="tag">${isHere ? 'อยู่ตำแหน่งนี้' : (elsewhereSlot ? 'อยู่ที่ ' + elsewhereSlot[0] : '')}</span>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.picker-option').forEach(opt => {
    opt.addEventListener('click', () => {
      assignPlayerToSlot(opt.dataset.player);
    });
  });

  document.getElementById('positionPickerModal').classList.add('show');
}

async function assignPlayerToSlot(player){
  if(!activePickerSlot) return;

  const team = state.teams.find(t=>t.id===activePickerSlot.teamId);
  if(!team) return;

  const formation = {...ensureFormation(team)};

  Object.keys(formation).forEach(k => {
    if(formation[k] === player){
      delete formation[k];
    }
  });

  formation[activePickerSlot.slotKey] = player;

  const ok = await updateTeam(team.id, { formation });

  if(ok){
    document.getElementById('positionPickerModal').classList.remove('show');
    renderAll();
  }
}

document.getElementById('pickerClearBtn').addEventListener('click', async () => {
  if(!activePickerSlot) return;

  const team = state.teams.find(t=>t.id===activePickerSlot.teamId);
  if(!team) return;

  const formation = {...ensureFormation(team)};
  delete formation[activePickerSlot.slotKey];

  const ok = await updateTeam(team.id, { formation });

  if(ok){
    document.getElementById('positionPickerModal').classList.remove('show');
    renderAll();
  }
});

document.getElementById('cancelPicker').addEventListener('click', () => {
  document.getElementById('positionPickerModal').classList.remove('show');
});

/* ========== COLLAPSIBLE SECTIONS ========== */
document.querySelectorAll('.section-head').forEach(head=>{
  head.addEventListener('click', ()=>{
    const target = document.getElementById(head.dataset.target);
    target.classList.toggle('collapsed');
    head.querySelector('.chev').textContent = target.classList.contains('collapsed') ? '▸' : '▾';
  });
});

/* ========== RENDER ALL ========== */
function renderAll(){
  renderTeamTabs();
  renderSummary();
  renderForm();
  renderRoster();
  renderFormation();
  renderStats();
  renderHistory();
}

/* ========== INIT ========== */
(async function init(){
  await loadState();
  renderAll();
})();
</script>
